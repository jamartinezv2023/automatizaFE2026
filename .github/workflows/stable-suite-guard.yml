name: Stable Suite Guard

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  stable-suite:
    name: Validate @stable Serenity suite
    runs-on: ubuntu-latest

    env:
      WEBDRIVER_DRIVER: chrome
      CHROME_BIN: /usr/bin/google-chrome

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Grant execute permission
        run: |
          chmod +x gradlew
          chmod +x scripts/qa/stable-suite-check.sh

      - name: Run stable suite guard
        run: |
          ./scripts/qa/stable-suite-check.sh \
            -Dwebdriver.driver=chrome \
            -Dheadless.mode=true \
            -Dchrome.switches="--headless=new;--no-sandbox;--disable-dev-shm-usage;--disable-gpu;--remote-allow-origins=*;--window-size=1920,1080"

      - name: Upload Serenity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-stable-report
          path: |
            target/site/serenity
            build/reports/tests/test
          if-no-files-found: ignore
