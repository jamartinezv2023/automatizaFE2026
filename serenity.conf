webdriver {
  driver = chrome
  autodownload = true

  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = [
        "--start-maximized",
        "--remote-allow-origins=*",
        "--disable-notifications",
        "--disable-popup-blocking",
        "--disable-extensions",
        "--disable-gpu"
      ]
    }
  }
}

webdriver.base.url = "https://logistica-frontend-54fk.onrender.com"

serenity {
  project.name = "Automatización E2E Sistema de Tracking Logístico"
  take.screenshots = FOR_FAILURES
  reports.show.step.details = true
  logging = VERBOSE
}
